<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="280" y="180" width="340" height="120" rx="18" fill="#fff" stroke="#0f172a" stroke-width="3"/>
  <text x="365" y="250" font-family="Georgia, serif" font-size="34" fill="#0f172a">More Convexity</text>
  <line x1="450" y1="70" x2="450" y2="175" stroke="#16a34a" stroke-width="6"/>
  <polygon points="450,40 425,85 475,85" fill="#16a34a"/>
  <text x="330" y="30" font-family="Arial, sans-serif" font-size="28" fill="#166534">Longer maturity</text>
  <line x1="140" y1="240" x2="275" y2="240" stroke="#16a34a" stroke-width="6"/>
  <polygon points="105,240 150,215 150,265" fill="#16a34a"/>
