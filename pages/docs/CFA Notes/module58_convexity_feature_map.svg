  <text x="215" y="380" font-family="Arial, sans-serif" font-size="24" fill="#475569">Same story as duration:</text>
  <text x="215" y="415" font-family="Arial, sans-serif" font-size="24" fill="#475569">longer maturity, lower coupon, lower yield</text>
  <text x="215" y="450" font-family="Arial, sans-serif" font-size="24" fill="#475569">all stretch cash flows and raise curvature.</text>
